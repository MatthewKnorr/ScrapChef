<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>ScrapChef</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="./styles/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wdth,wght@75..100,400..700&display=swap"
    rel="stylesheet">

  <link rel="icon" type="image/x-icon" href="./assets/favicon-32x32.png">
</head>

<body>
  <header id="header">
    <img src="./assets/SrapChef_Black.png" alt="ScrapChef">
    <div class="nav-links" id="navLinks">
      <a href="#" data-replace="Home"><span>Home</span></a>
      <a href="#" data-replace="Favorites"><span>Favorites</span></a>
      <a href="#" id="navRandomBtn">Random</a>
    </div>
    <div class="hamburger" id="hamburger">☰</div>
  </header>


  <div class="container">
    <!-- HOME VIEW-->
    <div id="homeView">
      <div class="home-layout">
        <div class="home-main">
          <div class="logo-large">
            <img src="./assets/Logo-large.png" alt="">
          </div>
          <h3>Enter Ingredient:</h3>
          <div class="input-section">
            <input id="ingredientInput" placeholder="Add ingredient...">
            <button id="addBtn">Add</button>
          </div>
          <div class="quick-add">
            <div id="quickList"></div>
          </div>

          <h3>Your Ingredients:</h3>
          <div id="ingredientList"></div>
          <div class="pantry-actions">
            <button id="savePantryBtn">Save to Pantry</button>
          </div>

          <div class="ingredient-icons">
            <img src="./assets/icons/Beat_Icon.png" alt="Beet">
            <img src="./assets/icons/Lemon_Icon.png" alt="Lemon">
            <img src="./assets/icons/Meat_Icon.png" alt="Meat">
          </div>

          <div class="filter-panel">
            <h3>Refine Results</h3>

            <div class="filter-row">
              <div class="filter-group">
                <label>Cuisine</label>
                <select id="cuisineFilter">
                  <option value="">All</option>
                  <option value="italian">Italian</option>
                  <option value="mexican">Mexican</option>
                  <option value="american">American</option>
                  <option value="asian">Asian</option>
                </select>
              </div>

              <div class="filter-group">
                <label>Diet</label>
                <select id="dietFilter">
                  <option value="">All</option>
                  <option value="vegetarian">Vegetarian</option>
                  <option value="vegan">Vegan</option>
                  <option value="gluten free">Gluten Free</option>
                  <option value="ketogenic">Keto</option>
                </select>
              </div>

              <div class="filter-group full">
                <label>Max Time: <span id="timeValue">60</span> min</label>
                <input type="range" id="timeFilter" min="10" max="120" step="5" value="60">
              </div>
            </div>
          </div>

          <button id="searchBtn">Find Recipes</button>
          <button id="randomBtn" class="secondary-btn">Random Recipe</button>
        </div>
      </div>
    </div>

    <!-- RESULTS VIEW-->
    <div id="resultsView" style="display:none;">
      <h3 id="resultsTitle"></h3>
      <div id="activeFilters"></div>
      <button class="returnHomeBtn">Return Home</button>
      <div id="recipeResults"></div>
      <div id="paginationControls">
        <button id="prevPageBtn">←</button>
        <span id="pageIndicator">1 / 2</span>
        <button id="nextPageBtn">→</button>
      </div>
    </div>

    <!-- DETAILS VIEW -->
    <div id="detailsView" style="display:none;">
      <button id="backToResultsBtn">← Back to Results</button>

      <h2 id="detailTitle"></h2>
      <img id="detailImage" />

      <div id="recipeControls">
        <div id="scaleControl">
          <button data-scale="0.5">0.5x</button>
          <button data-scale="1" class="active">1x</button>
          <button data-scale="2">2x</button>
        </div>

        <div id="wakeToggle" class="toggle">
          <div class="toggle-track">
            <div class="toggle-thumb"></div>
          </div>
          <span class="toggle-label">Stay Awake</span>
        </div>
      </div>
      <h3>Ingredients</h3>
      <ul id="detailIngredients"></ul>

      <h3>Instructions</h3>
      <div id="detailInstructions"></div>

      <button id="saveBtn">Save to Favorites</button>
    </div>

    <!-- Favorites VIEW -->
    <div id="favoritesView" style="display:none;">
      <h3>Favorites</h3>
      <button class="returnHomeBtn">Return Home</button>
      <div id="favoritesList"></div>
    </div>
  </div>

  <div id="pantrySidebar">
    <img src="./assets/Pantry_Black.png" alt="Pantry">
    <div id="pantryList"></div>
  </div>
  <script type="module" src="./js/main.mjs"></script>

</body>

</html>
