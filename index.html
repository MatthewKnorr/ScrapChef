<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>ScrapChef</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="./styles/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <header id="header">
    <div class="hamburger" id="hamburger">☰</div>

    <h1 class="nav-title">ScrapChef</h1>

    <div class="nav-links" id="navLinks">
      <a href="#" data-replace="Home"><span>Home</span></a>
      <a href="#" data-replace="Favorites"><span>Favorites</span></a>
      <a href="#" data-replace="Random"><span>Random</span></a>
    </div>
  </header>

  <div class="container">
    <!-- HOME VIEW-->
    <div id="homeView">
      <div class="home-layout">
        <div class="home-main">
          <h3>Enter Ingredient:</h3>
          <div class="input-section">
            <input id="ingredientInput" placeholder="Add ingredient...">
            <button id="addBtn">Add</button>
          </div>
          <div class="quick-add">
            <div id="quickList"></div>
          </div>

          <h3>Your Ingredients:</h3>
          <div id="ingredientList"></div>

          <button id="searchBtn" disabled>Find Recipes</button>
        </div>
      </div>
    </div>

    <!-- RESULTS VIEW-->
    <div id="resultsView" style="display:none;">
      <h3 id="resultsTitle"></h3>
      <button id="newSearchBtn">New Search</button>
      <div id="recipeResults"></div>
    </div>

    <!-- DETAILS VIEW -->
    <div id="detailsView" style="display:none;">
      <button id="backToResultsBtn">← Back to Results</button>

      <h2 id="detailTitle"></h2>
      <img id="detailImage" />

      <h3>Ingredients</h3>
      <ul id="detailIngredients"></ul>

      <h3>Instructions</h3>
      <div id="detailInstructions"></div>

      <button id="saveBtn">Save to Favorites</button>
    </div>

    <!-- Favorites VIEW -->
    <div id="favoritesView" style="display:none;">
      <h3>Favorites</h3>
      <div id="favoritesList"></div>
    </div>

  </div>

  <script type="module" src="./js/main.mjs"></script>

</body>

</html>
